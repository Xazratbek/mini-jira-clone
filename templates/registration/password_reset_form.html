{% extends "base.html" %}

{% block title %}Parolni tiklash | PulseBoard{% endblock title %}

{% block content %}
<section class="page-header stagger">
    <h1 class="page-title">Parolni tiklash.</h1>
    <p class="page-subtitle">Email manzilingizni kiriting, tiklash havolasi yuboriladi.</p>
</section>
<section class="panel stagger" style="max-width: 760px;">
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <div class="button-row">
            <button type="submit" class="btn btn-primary">Yuborish</button>
            <a href="{% url 'login' %}" class="btn btn-secondary">Login</a>
        </div>
    </form>
</section>
{% endblock content %}
